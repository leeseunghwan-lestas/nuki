<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Background: rounded square with emerald→cyan gradient -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Base -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <!-- Subtle top shine -->
  <rect width="128" height="64" rx="28" fill="url(#shine)"/>

  <!-- Viewfinder corners (capture motif) -->
  <g stroke="white" stroke-width="3.5" stroke-linecap="round" fill="none" opacity="0.9">
    <!-- Top-left -->
    <path d="M32 46 L32 32 L46 32"/>
    <!-- Top-right -->
    <path d="M82 32 L96 32 L96 46"/>
    <!-- Bottom-left -->
    <path d="M32 82 L32 96 L46 96"/>
    <!-- Bottom-right -->
    <path d="M82 96 L96 96 L96 82"/>
  </g>

  <!-- Text lines inside viewfinder (cute document feel) -->
  <g stroke="white" stroke-linecap="round" opacity="0.85">
    <line x1="44" y1="52" x2="72" y2="52" stroke-width="3"/>
    <line x1="44" y1="62" x2="84" y2="62" stroke-width="3"/>
    <line x1="44" y1="72" x2="66" y2="72" stroke-width="3"/>
  </g>

  <!-- Scanning cursor line (animated feel) -->
  <rect x="42" y="79" width="44" height="2.5" rx="1.25" fill="white" opacity="0.5"/>
</svg>
